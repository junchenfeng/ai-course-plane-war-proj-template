<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>飞机大战</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <!-- 左上角关卡信息 -->
    <div id="level-display">第1关：测试关</div>
    <div id="enemy-count">敌人：0/0</div>

    <!-- HUD 左下角 -->
    <div id="hud">
      <div id="hp-container">♥♥♥♥♥</div>
      <div id="powerup-bar">
        <div id="spread-indicator" class="powerup-indicator"><span class="key-badge">1</span>散弹</div>
        <div id="bomb-indicator" class="powerup-indicator"><span class="key-badge">2</span>炸弹</div>
      </div>
      <div id="score-display">得分：0</div>
    </div>

    <!-- 右下角操作说明 -->
    <div id="controls-help">
      <div class="help-line"><span class="help-key">移动</span><span class="help-val" id="help-move">WASD</span></div>
      <div class="help-line"><span class="help-key">射击</span><span class="help-val" id="help-shoot">空格</span></div>
      <div class="help-line"><span class="help-key">散弹</span><span class="help-val" id="help-spread">数字1</span></div>
      <div class="help-line"><span class="help-key">炸弹</span><span class="help-val" id="help-bomb">数字2</span></div>
    </div>

    <!-- Boss HP -->
    <div id="boss-hp-container" style="display:none;">
      <div id="boss-hp-label">BOSS</div>
      <div id="boss-hp-bar-bg">
        <div id="boss-hp-bar"></div>
      </div>
    </div>

    <!-- 开始界面 -->
    <div id="start-screen">
      <div class="screen-content">
        <h1>✈ 飞机大战</h1>
        <p>WASD 或鼠标移动 | 空格或点击射击 | 数字1 散弹 | 数字2 炸弹</p>
        <button id="start-btn">开始游戏</button>
      </div>
    </div>

    <!-- 游戏结束 -->
    <div id="game-over-screen" style="display:none;">
      <div class="screen-content">
        <h1>游戏结束</h1>
        <p>得分：<span id="final-score">0</span></p>
        <button id="restart-btn">重新开始</button>
      </div>
    </div>

    <!-- 胜利 -->
    <div id="win-screen" style="display:none;">
      <div class="screen-content">
        <h1>🎉 恭喜通关！</h1>
        <p>总得分：<span id="win-score">0</span></p>
        <p>击坠数：<span id="win-kills">0</span></p>
        <button id="win-restart-btn">再来一局</button>
      </div>
    </div>

    <!-- 关卡过渡 -->
    <div id="transition-screen" style="display:none;">
      <div class="screen-content">
        <h1 id="transition-text">下一关：boss来了</h1>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
