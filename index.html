<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>飞机大战</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div id="hp-container">♥♥♥♥♥</div>
      <div id="level-display">第1关：测试关</div>
      <div id="enemy-count">敌人：0/0</div>
    </div>

    <!-- Boss HP -->
    <div id="boss-hp-container" style="display:none;">
      <div id="boss-hp-label">BOSS</div>
      <div id="boss-hp-bar-bg">
        <div id="boss-hp-bar"></div>
      </div>
    </div>

    <!-- 开始界面 -->
    <div id="start-screen">
      <div class="screen-content">
        <h1>✈ 飞机大战</h1>
        <p>WASD 或鼠标移动 | 空格或点击射击</p>
        <button id="start-btn">开始游戏</button>
      </div>
    </div>

    <!-- 游戏结束 -->
    <div id="game-over-screen" style="display:none;">
      <div class="screen-content">
        <h1>游戏结束</h1>
        <p>得分：<span id="final-score">0</span></p>
        <button id="restart-btn">重新开始</button>
      </div>
    </div>

    <!-- 胜利 -->
    <div id="win-screen" style="display:none;">
      <div class="screen-content">
        <h1>🎉 恭喜通关！</h1>
        <p>得分：<span id="win-score">0</span></p>
        <button id="win-restart-btn">再来一局</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
