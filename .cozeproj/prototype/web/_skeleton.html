<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 字体（按需，系统字体时省略；只能用 Google 字体，CSS 地址前缀：https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google） -->
  <!-- <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/> -->

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #8B5CF6;
      --color-primary-container:    #2E1065;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #0A0A1A;
      --color-surface-container-lowest:   #0F0F28;
      --color-surface:                    #14143A;
      --color-surface-container:          #1A1A4A;
      --color-surface-container-high:     #222255;
      --color-surface-container-highest:  #2A2A60;
      /* === 文字 === */
      --color-on-surface:           #E4E4F0;
      --color-on-surface-variant:   #8B8BA8;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #3D3D70;
      --color-outline-variant:  #2A2A55;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影（background ≈ surface 时 opacity ≥ 0.08） === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.4);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.5);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.6);
      /* === 字体 === */
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件，不需要的页面则不要复制此段 -->
  <header class="bg-surface/80 backdrop-blur-md border-b border-outline-variant/20 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-primary/20 flex items-center justify-center">
          <i data-lucide="rocket" class="w-5 h-5 text-primary"></i>
        </div>
        <span class="font-bold text-lg text-on-surface">星际战机</span>
      </div>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2 bg-surface-container rounded-full px-4 py-1.5">
          <i data-lucide="coins" class="w-4 h-4 text-warning"></i>
          <span class="text-sm font-semibold text-on-surface">12,580</span>
        </div>
        <div class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center">
          <i data-lucide="user" class="w-4 h-4 text-on-surface-variant"></i>
        </div>
      </div>
    </div>
  </header>
  <!-- @nav:end 导航组件，不需要的页面则不要复制此段 -->

  <main class="max-w-6xl mx-auto px-6 py-8">
    <!-- @main-content:start -->
    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
